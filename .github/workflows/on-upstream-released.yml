# Layer 2 handler: react to an upstream's release.
#
# Thin caller of arthur-debert/release's canonical `cascade-handler@v3`.
# The reusable workflow runs the 5 `scripts/release/` primitives in order:
#   should-release → get-current-version → (compute new) → update-release
#   → commit + branch + admin-merge PR → trigger-release
# All 10 gotchas from the canonical cascade doc are folded in:
# https://github.com/arthur-debert/release/blob/main/docs/lex-release-cascade.md
# Concurrency control + `submodules: recursive` checkout are set
# inside the reusable workflow.
#
# Cross-repo release automation: when an upstream this repo depends on
# fires `repository_dispatch`, this listener kicks off the cascade. TWO
# event types are accepted (ADP02-WS09, #158):
#
#   upstream-released  the legacy cascade's type (release/cascade docs) —
#                      payload {source, version, run_url}. Kept until the
#                      legacy cascade retires.
#   upstream-release   shipit's notify-downstreams type (shipit#824's
#                      NOTIFY_EVENT_TYPE, TOL02-WS16) — fired by an
#                      upstream's shipit publish stage on a real release;
#                      payload {repo, tag, version, artifact} (no `source`
#                      key — the handler's should-release re-checks ALL
#                      pins, so the source slug is informational).
#
# Manual trigger (for testing / recovery):
#   gh api repos/<owner>/<repo>/dispatches \
#     --method POST -f event_type=upstream-released \
#     -F client_payload[source]=<upstream> -F client_payload[version]=vX.Y.Z

name: On upstream released

on:
  repository_dispatch:
    types: [upstream-released, upstream-release]

permissions:
  contents: write
  pull-requests: write

jobs:
  cascade:
    uses: arthur-debert/release/.github/workflows/cascade-handler.yml@v3
    with:
      git-author-name: lex-fmt release-bot
      git-author-email: release-bot@lex-fmt.local
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
