name: shipit-release

# lex-fmt/vscode's shipit release caller (ADP02-WS09,
# arthur-debert/shipit#842; this repo's issue #158) — the BLESSED per-stage
# dispatch shape (ADR-0054, workflows.lex §8), copied from
# arthur-debert/shipit's own shipit-release.yml (model: standout#187): one
# workflow_dispatch caller with a `stage` choice (full | prepare | build |
# sign | publish), one job per stage, each a single `uses:` line against the
# matching block, gated `if: inputs.stage == '...'`, forwarding
# `version`/`tag`/`run-id`/`unsigned` verbatim. Routing ONLY (ADR-0040): the
# release plan — matrix, live stages, the post-RC-guard endpoint set,
# required secrets — is preflight's, computed inside the blocks; nothing is
# re-derived or wired stage-to-stage here.
#
# Every ref is the FULL remote `arthur-debert/shipit/...@v1` form — never
# `./` relative (which would resolve against THIS repo, where no blocks
# live), never SHA-pinned (the fleet rides the advance-major-moved `v1`,
# ADR-0010).
#
# This repo's release surface (.shipit.toml [artifacts.lex-vscode]): the npm
# build leg fanned over four platform lanes, each bundling one per-target
# `.vsix` (the TOL02-WS13 `vsix` composition — asset-name parity with legacy
# v0.11.3's lex-vscode-{darwin-arm64,linux-arm64,linux-x64,win32-x64}.vsix),
# published to gh-release + vscode-marketplace + open-vsx. Both marketplace
# endpoints are external registries, so the central RC guard drops them on a
# `-release-rc` cut: the rc proof is build + gh-release only, and a real
# marketplace publish is an owner call at the gate. No sign stage in the
# plan (no `sign = true` — a .vsix is not a mac bundle), so a `sign`
# dispatch is a plan-proven no-op and preflight refuses `--unsigned`; both
# choices stay offered because this caller rides the blessed shape, never a
# trimmed variant.
#
# Secrets — exactly the plan-required set for this repo's plan:
#   RELEASE_TOKEN  prepare's tag+branch push through the ruleset (a
#                  GITHUB_TOKEN push would not re-trigger workflows).
#   VSCE_PAT       the vscode-marketplace endpoint's registry token.
#   OVSX_PAT       the open-vsx endpoint's registry token.
# Both PATs forward to the stages that can publish (`full`, `publish`); the
# RC guard drops both endpoints on an -release-rc version centrally.
# gh-release rides the workflow's own GITHUB_TOKEN (no registry entry).
# The Apple signing set is not forwarded (no sign stage in the plan).

on:
  workflow_dispatch:
    inputs:
      version:
        description: >-
          The release version, consumed by `full`/`prepare`: a bare semver
          (0.12.0, 0.12.0-release-rc) or a bump word (major|minor|patch).
          Ignored by the tag-dispatched stages.
        required: false
        type: string
      stage:
        description: >-
          What to dispatch: the full composed chain (default) or ONE
          independently re-runnable stage block (per-stage dispatch,
          ADR-0054). `prepare` dispatches on `version`; `build`, `sign`
          and `publish` on `tag` (+ `run-id` for the artifact-consuming
          stages).
        required: false
        type: choice
        default: full
        options:
          - full
          - prepare
          - build
          - sign
          - publish
      tag:
        description: >-
          The release tag (v<version>), consumed by the `build`/`sign`/
          `publish` stage dispatches (ADR-0041: the version is read off
          the tag). Ignored by `full`/`prepare`.
        required: false
        type: string
      run-id:
        description: >-
          The SOURCE run id whose artifacts feed an artifact-consuming
          stage dispatch (`sign`, `publish`) — one source run per dispatch
          (workflows.lex §8). Ignored by the other stages.
        required: false
        type: string
      unsigned:
        description: >-
          Break-glass: flip a signing plan to the unsigned path. Forwarded
          verbatim; this repo's plan has no sign stage, so preflight
          refuses it here — offered because this caller rides the blessed
          shape.
        required: false
        type: boolean
        default: false

# The standalone dispatch caller's grant (workflows.lex §8): `contents:
# write` for prepare's push and publish's gh-release, `actions: read` for
# the cross-run artifact downloads (`run-id` flips download-artifact onto
# the REST API). The downloading blocks deliberately declare NO
# `permissions:` key — a called workflow can only downgrade this token.
permissions:
  contents: write
  actions: read

jobs:
  release:
    if: inputs.stage == 'full'
    uses: arthur-debert/shipit/.github/workflows/wf-release.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

  prepare:
    if: inputs.stage == 'prepare'
    uses: arthur-debert/shipit/.github/workflows/wf-prepare.yml@v1
    with:
      version: ${{ inputs.version }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}

  build:
    if: inputs.stage == 'build'
    uses: arthur-debert/shipit/.github/workflows/wf-build.yml@v1
    with:
      tag: ${{ inputs.tag }}

  sign:
    if: inputs.stage == 'sign'
    uses: arthur-debert/shipit/.github/workflows/wf-sign-mac.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}

  publish:
    if: inputs.stage == 'publish'
    uses: arthur-debert/shipit/.github/workflows/wf-publish.yml@v1
    with:
      tag: ${{ inputs.tag }}
      run-id: ${{ inputs.run-id }}
      unsigned: ${{ inputs.unsigned }}
    secrets:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
