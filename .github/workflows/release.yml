name: Release

# Thin caller of arthur-debert/release/.github/workflows/vscode-ext.yml@v1.
# All the matrix + build + sign + publish logic lives there; this file is
# just the binding (inputs, secrets) and the workflow_dispatch trigger.
#
# Replaces the prior tag-push triggered hand-rolled release.yml. Switch
# rationale: the canonical workflow uses prepare-release-npm (composite
# version bump + tag), so the trigger contract is workflow_dispatch with a
# `version` input — matching the cross-repo cascade-handler contract.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 0.11.0 or 1.0.0-rc.1). No leading v.'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    uses: arthur-debert/release/.github/workflows/vscode-ext.yml@v1
    with:
      version: ${{ inputs.version }}
      vsce-targets: 'darwin-arm64,linux-x64,linux-arm64,win32-x64'
      extension-name: 'lex-vscode'
      # Marketplace: on. Open VSX: temporarily OFF — namespace `lex`
      # was granted (EclipseFdn/open-vsx.org#10424, 2026-05-19) but
      # v0.10.7's first publish under the restricted namespace surfaced
      # two blockers: (a) the OVSX_PAT in repo secrets fails
      # /api/lex/verify-pat and needs to be regenerated by the
      # namespace owner (arthur-debert account), and (b) the UI
      # upload of v0.10.7 got stuck in "Under review → could not be
      # published, Extension Not Found", which only Open VSX support
      # can clean up. Flip back to true once both are resolved.
      publish-marketplace: true
      publish-openvsx: false
      # submodules: true to keep the shared/ git submodule populated
      # (the existing release.yml passes `submodules: true`).
      submodules: true
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
