name: CI

# Thin caller of arthur-debert/release/.github/workflows/vscode-ext-ci.yml.

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    uses: arthur-debert/release/.github/workflows/vscode-ext-ci.yml@v1
    with:
      # Build the shared/ module before the umbrella check — the main
      # extension's TypeScript depends on its compiled dist/.
      pre-check: app-bin/ci-build-shared-hook.sh
      # This repo's umbrella verbs (typecheck via `npm run build`,
      # lint, unit tests) are wired as npm scripts. Chain them in
      # the canonical's single check-command input.
      check-command: 'npm run build && npm run lint && npm run test:unit'
      submodules: true
