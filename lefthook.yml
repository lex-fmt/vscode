output:
  - meta
  - skips
  - summary
pre-commit:
  parallel: true
  commands:
    markdownlint:
      glob: "**/*.md"
      run: >-
        if command -v markdownlint >/dev/null 2>&1; then

          markdownlint {staged_files};
        else

          echo "markdownlint not installed (skipping; install via npm i -g markdownlint-cli or brew install markdownlint-cli)" >&2;
        fi
      priority: 2
    yamllint:
      glob: "**/*.{yml,yaml}"
      run: >-
        if command -v yamllint >/dev/null 2>&1; then

          yamllint {staged_files};
        else

          echo "yamllint not installed (skipping; install via pip install yamllint or brew install yamllint)" >&2;
        fi
      priority: 2
    shellcheck:
      glob:
        - "**/*.{sh,bash}"
        - "scripts/**"
        - "bin/**"
      exclude:
        - "**/*.{md,json,yaml,yml,toml,py,rb,rs,js,ts,mjs,cjs,html,css,txt,lock}"
      run: >-
        if command -v shellcheck >/dev/null 2>&1; then

          shellcheck {staged_files};
        else

          echo "shellcheck not installed (skipping; install: see https://github.com/koalaman/shellcheck#installing)" >&2;
        fi
      priority: 2
    eslint:
      glob:
        - "**/*.{js,jsx,ts,tsx,vue,mjs,cjs}"
        - "**/.eslintrc*"
        - "**/eslint.config.*"
      run: npx --no-install eslint --max-warnings 0 -- {staged_files}
      priority: 2
    prettier:
      glob:
        - "**/*.{js,jsx,ts,tsx,vue,svelte,json,html,css,scss,md,yml,yaml}"
      run: npx --no-install prettier --check -- {staged_files}
      priority: 2
    typecheck:
      glob:
        - "**/*.{ts,tsx}"
        - "**/tsconfig*.json"
      run: npm run --silent typecheck --if-present
      priority: 2
