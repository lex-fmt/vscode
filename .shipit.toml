# [secrets] — repo Actions secrets. Each table key is the GitHub secret NAME; the
# value names exactly one source ({ doppler = "KEY" } / { env = "VAR" } /
# { prompt = true }). Seeded with shipit's local-reviewer (codex/agy) GitHub App
# credentials, each sourced from Doppler github/prd. `shipit gh-setup` only pushes
# a secret when its source resolves, so these are safe before the App is installed.
[secrets]
CODEX_REVIEW_APP_PRIVATE_KEY = { doppler = "CODEX_REVIEW_APP_PRIVATE_KEY" }
CODEX_REVIEW_APP_ID          = { doppler = "CODEX_REVIEW_APP_ID" }
AGY_REVIEW_APP_PRIVATE_KEY   = { doppler = "AGY_REVIEW_APP_PRIVATE_KEY" }
AGY_REVIEW_APP_ID            = { doppler = "AGY_REVIEW_APP_ID" }

# [reviewers] — the required-reviewer SET for this repo's PRs (the map KEYS are
# required; ALL must be DONE to flip Ready). Seeded with shipit's shipped default
# (Copilot, review-once), rendered from the single source in
# `prstate.reviewers_config.DEFAULT_REVIEWERS`. codex/agy are NOT seeded by default —
# their review GitHub Apps are not installed on an arbitrary repo, so requiring them
# would park PRs at REVIEWS_PENDING; a repo that HAS the Apps opts them in here (e.g.
# `codex = {}`). Review-once: `rerun` defaults OFF (token-billed; opt in per reviewer
# with e.g. `copilot = { rerun = true }`).
[reviewers]
copilot = {}

# [lint].ignore — paths the managed lint gate must SKIP. Seeded with common
# generated/assembled files (a built CHANGELOG, package lockfiles) that are not
# hand-written prose, so a freshly-onboarded repo does not take a latent gate
# failure on them. Gitignore-style globs. You OWN this list and may extend it —
# it is reconcile-safe: `shipit install` seeds [lint] only when absent and never
# clobbers a table you have edited.
[lint]
ignore = [
  "CHANGELOG.md",
  "CHANGELOG/**",
  "package-lock.json",
  "pnpm-lock.yaml",
  # Test fixtures are non-hand-authored test data, not source: label-policy.lex is
  # an intentional NEGATIVE fixture (deliberately-forbidden labels, to exercise
  # lexd's diagnostics), and the sample-workspace docs symlink external benchmark
  # corpus in from the `comms` submodule — none should gate this repo. Mirrors the
  # repo's existing .prettierignore exclusion of the same dir ("Test fixtures are
  # intentionally unformatted"); keeps the lex leg off them the way prettier already is.
  "test/fixtures/**",
]

# [lanes] — the declared PR-time check units (ADP02-WS03, #155; model: lex#829).
# The lane planner (`shipit ci plan`) maps these + the CI event + a path-diff to
# the job matrix the wf-checks workflow block runs (`pixi run --locked <run>` per
# job). Both lanes' tasks SELF-PROVISION, because on a hosted runner nothing
# outside pixi is provisioned:
#   - `lint-full` (NOT the managed bare `lint` task, which runs in the default
#     env where no lint tool exists) resolves into the pixi lint env and
#     provisions lexd inline — see its definition in pixi.toml
#     [feature.lint.tasks].
#   - `test-full` inits the `comms` submodule (gen-theme's canonical theme data
#     rides it, and the legacy caller passed `submodules: true`), builds the
#     shared/ module, then runs the legacy check-command verbs (typecheck via
#     `npm run build`, eslint, unit tests) — the wf-checks checkout has no
#     submodule support; node/npm, python (gen-theme) and uv (for bin/shipit)
#     ride pixi's default env ([dependencies] in pixi.toml).
[lanes.lint]
run = "lint-full"
required = true
local = true

[lanes.test]
run = "test-full"
required = true
local = true

[toolchains]
"." = "npm"

# [artifacts] — this repo's declared release surface for the shipit release
# pipeline (ADP02-WS09, arthur-debert/shipit#842 — the FIRST CONSUMER FIRE of
# the TOL02-WS13 composition, shipit#821: per-target .vsix + the
# vscode-marketplace/open-vsx endpoints). ONE artifact: the extension itself.
#
#   - build: the bare `npm` leg ([toolchains] "." above) — `npm run build`
#     (tsc). The per-target packaging is the BUNDLE step, not the build.
#   - platforms: the four legacy lanes. The vsix composition maps each closed
#     platform name to its vsce target string (shipit VSCE_TARGETS:
#     linux-x86_64 → linux-x64, windows-x86_64 → win32-x64) and writes
#     `<name>-<vsce-target>.vsix` — so `lex-vscode` + these four platforms
#     reproduce legacy v0.11.3's asset set name-for-name:
#     lex-vscode-{darwin-arm64,linux-arm64,linux-x64,win32-x64}.vsix.
#   - endpoints: gh-release + both marketplaces, per #821's decision record
#     and the #842 doctrine. Both marketplace endpoints are external
#     REGISTRIES: the central RC guard drops them on a `-release-rc` cut
#     (rc proof = build + gh-release only); a REAL marketplace/open-vsx
#     publish is an owner call at the gate. Tokens: VSCE_PAT / OVSX_PAT
#     (repo secrets, present — forwarded by the shipit-release.yml caller).
#
# FLAGGED gaps (per the issue: flag, never work around):
#   1. win32-x64: the plan's windows-x86_64 lane runs on `windows-latest`
#      executing shipit itself (the bundle verb runs on the lane's runner) —
#      shipit is not yet win-importable (arthur-debert/shipit#893, fix in
#      flight). The win32 leg of the rc proof depends on that landing
#      shipit-side; not worked around here.
#   2. Native-deps staging: legacy vscode-ext.yml@v3 ran
#      app-bin/pre-vsce-package-hook.sh (shared/ submodule build +
#      fetch-deps: per-target lexd-lsp binary + tree-sitter wasm/queries
#      into resources/) between npm ci and vsce package. The vsix
#      composition runs only `npm exec -- vsce package` in the npm leg;
#      nothing in the shipit lane stages those resources yet. Hard edge for
#      the rc proof — per #842 doctrine, the fix lands shipit-side (or as a
#      declared follow-up), never a consumer-side workaround here.
#   3. open-vsx: declared (per #821: "wired-but-off until the consumer's
#      OVSX_PAT verifies" — declaring IS the per-repo config choice), but
#      the legacy release.yml records two live blockers: the stored
#      OVSX_PAT fails /api/lex/verify-pat (needs regeneration by the
#      namespace owner) and v0.10.7 is stuck "Under review" open-vsx-side.
#      rc's are unaffected (RC guard); a real open-vsx publish stays
#      blocked until both clear.
[artifacts.lex-vscode]
build = ["npm"]
platforms = ["darwin-arm64", "linux-arm64", "linux-x86_64", "windows-x86_64"]
bundle = { composition = "vsix" }
endpoints = ["gh-release", "vscode-marketplace", "open-vsx"]

